<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS2 Profile Card – Discord Embed Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & page shell ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1b2e;
      font-family: 'Inter', sans-serif;
      padding: 32px 16px;
    }

    /* ── Discord-like embed container ── */
    .embed {
      background: #1e2030;
      border-left: 4px solid #e91e63;
      border-radius: 6px;
      padding: 18px 20px 18px 20px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ── Header row ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .username {
      font-size: 1.45rem;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .username .separator {
      color: #8b8fa8;
      font-weight: 400;
      margin: 0 4px;
    }

    .username .service {
      color: #ffffff;
    }

    /* Leetify icon pill */
    .icon-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e91e63;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
    }

    .icon-pill svg {
      width: 16px;
      height: 16px;
      fill: #ffffff;
    }

    /* Clan tag pill */
    .clan-tag {
      background: #3a3d52;
      color: #c0c3d4;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Gear / settings icon */
    .gear-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: 2px solid #4a4e65;
      border-radius: 50%;
      cursor: pointer;
    }

    .gear-icon svg {
      width: 15px;
      height: 15px;
      fill: #8b8fa8;
    }

    /* Header right side */
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Leetify badge */
    .leetify-badge {
      border: 1.5px solid #e91e63;
      border-radius: 6px;
      padding: 5px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .leetify-badge .provided-by {
      font-size: 0.55rem;
      color: #8b8fa8;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .leetify-badge .leetify-logo {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .leetify-badge .leetify-logo .leet-icon {
      background: #e91e63;
      border-radius: 3px;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .leetify-badge .leetify-logo .leet-icon svg {
      width: 12px;
      height: 12px;
      fill: #fff;
    }

    .leetify-badge .leetify-logo .leet-text {
      font-size: 0.85rem;
      font-weight: 700;
      color: #ffffff;
      font-style: italic;
    }

    /* View on Leetify link */
    .view-link {
      font-size: 0.8rem;
      color: #7289da;
      text-decoration: underline;
      cursor: pointer;
      line-height: 1.3;
      text-align: center;
      white-space: nowrap;
    }

    .view-link:hover { color: #99aaff; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: #2e3148;
      margin-bottom: 16px;
    }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      row-gap: 18px;
      column-gap: 8px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .stat-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: #8b8fa8;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e0e2f0;
      white-space: nowrap;
    }

    /* Special colouring variants */
    .stat-value.positive  { color: #48c978; }
    .stat-value.negative  { color: #e05060; }
    .stat-value.neutral   { color: #e0e2f0; }
    .stat-value.orange    { color: #f59e42; }
    .stat-value.underline { border-bottom: 2px solid #e0e2f0; display: inline-block; }

    /* Peak rating with blue bars icon */
    .peak-rating-val {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .peak-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 18px;
    }

    .peak-bars span {
      width: 4px;
      border-radius: 1px;
      background: #4a7dff;
    }

    .peak-bars span:nth-child(1) { height: 8px; }
    .peak-bars span:nth-child(2) { height: 12px; }
    .peak-bars span:nth-child(3) { height: 18px; }

    .peak-number {
      font-size: 1.1rem;
      font-weight: 800;
      color: #6b9bff;
      font-style: italic;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  </style>
</head>
<body>

<div class="embed">

  <!-- ── Header ── -->
  <div class="header">
    <div class="header-left">
      <!-- Username -->
      <span class="username">
        <span id="player-name">CVS</span>
        <span class="separator"> | </span>
        <span class="service">SCOPE.GG</span>
      </span>

      <!-- Leetify L icon -->
      <span class="icon-pill" title="Leetify">
        <!-- Simple "L" icon representing Leetify -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 4h4v12h6v4H5V4z"/>
        </svg>
      </span>

      <!-- Clan tag -->
      <span class="clan-tag" id="clan-tag">DMT</span>

      <!-- Settings gear -->
      <span class="gear-icon" title="Settings">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 15.5A3.5 3.5 0 018.5 12 3.5 3.5 0 0112 8.5a3.5 3.5 0 013.5 3.5 3.5 3.5 0 01-3.5 3.5m7.43-2.92c.04-.36.07-.72.07-1.08s-.03-.73-.07-1.08l2.33-1.82c.21-.16.27-.45.13-.69l-2.2-3.82c-.13-.23-.42-.32-.65-.23l-2.74 1.1c-.57-.44-1.18-.81-1.85-1.09l-.42-2.92c-.04-.26-.27-.46-.54-.46h-4.4c-.27 0-.5.2-.54.46l-.42 2.92c-.67.28-1.28.65-1.85 1.09l-2.74-1.1c-.24-.09-.52 0-.65.23l-2.2 3.82c-.14.24-.07.53.13.69l2.33 1.82c-.04.35-.07.72-.07 1.08s.03.73.07 1.08L2.1 14c-.21.16-.27.45-.13.69l2.2 3.82c.13.23.42.32.65.23l2.74-1.1c.57.44 1.18.81 1.85 1.09l.42 2.92c.04.26.27.46.54.46h4.4c.27 0 .5-.2.54-.46l.42-2.92c.67-.28 1.28-.65 1.85-1.09l2.74 1.1c.24.09.52 0 .65-.23l2.2-3.82c.14-.24.07-.53-.13-.69l-2.33-1.82z"/>
        </svg>
      </span>
    </div>

    <div class="header-right">
      <!-- Leetify data badge -->
      <div class="leetify-badge">
        <div class="provided-by">Data provided by</div>
        <div class="leetify-logo">
          <div class="leet-icon">
            <svg viewBox="0 0 24 24"><path d="M5 4h4v12h6v4H5V4z"/></svg>
          </div>
          <span class="leet-text">leetify</span>
        </div>
      </div>

      <!-- View on Leetify link -->
      <a id="leetify-link" class="view-link" href="#" target="_blank">View on<br>Leetify</a>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ── Stats Grid ── -->
  <div class="stats-grid">

    <!-- Row 1 -->
    <div class="stat">
      <div class="stat-label">AIM</div>
      <div class="stat-value" id="stat-aim">–</div>
    </div>

    <div class="stat">
      <div class="stat-label">CLUTCH</div>
      <div class="stat-value" id="stat-clutch">–</div>
    </div>

    <div class="stat">
      <div class="stat-label">RATING</div>
      <div class="stat-value" id="stat-rating">–</div>
    </div>

    <div class="stat">
      <div class="stat-label">TIME TO DMG</div>
      <div class="stat-value" id="stat-time-to-dmg">–</div>
    </div>

    <div class="stat">
      <div class="stat-label">WINRATE</div>
      <div class="stat-value" id="stat-winrate">–</div>
    </div>

    <!-- Row 2 -->
    <div class="stat">
      <div class="stat-label">UTILITY</div>
      <div class="stat-value" id="stat-utility">–</div>
    </div>

    <div class="stat">
      <div class="stat-label">OPENING</div>
      <div class="stat-value" id="stat-opening">–</div>
    </div>

    <div class="stat">
      <div class="stat-label">PARTY</div>
      <div class="stat-value" id="stat-party">–</div>
    </div>

    <div class="stat">
      <div class="stat-label">AVG HE DMG</div>
      <div class="stat-value" id="stat-he-dmg">–</div>
    </div>

    <div class="stat">
      <div class="stat-label">MATCHES</div>
      <div class="stat-value" id="stat-matches">–</div>
    </div>

    <!-- Row 3 -->
    <div class="stat">
      <div class="stat-label">POSITION</div>
      <div class="stat-value" id="stat-position">–</div>
    </div>

    <div class="stat">
      <div class="stat-label">KD</div>
      <div class="stat-value" id="stat-kd">–</div>
    </div>

    <div class="stat">
      <div class="stat-label">PREAIM</div>
      <div class="stat-value" id="stat-preaim">–</div>
    </div>

    <div class="stat">
      <div class="stat-label">PEAK RATING</div>
      <div class="stat-value peak-rating-val" id="stat-peak-rating">
        <div class="peak-bars">
          <span></span><span></span><span></span>
        </div>
        <span class="peak-number" id="peak-number">–</span>
      </div>
    </div>

    <div class="stat">
      <div class="stat-label">BANNED MATES</div>
      <div class="stat-value orange" id="stat-banned">–</div>
    </div>

  </div>
</div>

<!-- ── Data population ── -->
<script>
  // Full CVS data from Leetify API
  const data = {
    "privacy_mode": "public",
    "winrate": 0.2593,
    "total_matches": 465,
    "first_match_date": "2020-03-22T11:25:56.000Z",
    "name": "CVS",
    "bans": [],
    "steam64_id": "76561198044837598",
    "id": "09f97acd-5d46-4806-becf-680b8b369265",
    "ranks": {
      "leetify": -5.83,
      "premier": null,
      "faceit": null,
      "faceit_elo": null,
      "wingman": null,
      "renown": null,
      "competitive": [
        { "map_name": "de_dust2", "rank": 4 },
        { "map_name": "de_thera",  "rank": 0 }
      ]
    },
    "rating": {
      "aim": 1.3903,
      "positioning": 20.3269,
      "utility": 33.5656,
      "clutch": 0.0755,
      "opening": -0.0839,
      "ct_leetify": -0.0603,
      "t_leetify": -0.0561
    },
    "stats": {
      "accuracy_enemy_spotted": 20.6634,
      "accuracy_head": 17.4491,
      "counter_strafing_good_shots_ratio": 52.1564,
      "ct_opening_aggression_success_rate": 12.3926,
      "ct_opening_duel_success_percentage": 19.7074,
      "flashbang_hit_foe_avg_duration": 2.7324,
      "flashbang_hit_foe_per_flashbang": 0.6655,
      "flashbang_hit_friend_per_flashbang": 0.3613,
      "flashbang_leading_to_kill": 5.084,
      "flashbang_thrown": 15.9466,
      "he_foes_damage_avg": 7.959,
      "he_friends_damage_avg": 0.4223,
      "preaim": 16.6821,
      "reaction_time_ms": 835.6902,
      "spray_accuracy": 24.8092,
      "t_opening_aggression_success_rate": 13.3102,
      "t_opening_duel_success_percentage": 13.3102,
      "traded_deaths_success_percentage": 43.9395,
      "trade_kill_opportunities_per_round": 0.236,
      "trade_kills_success_percentage": 38.6428,
      "utility_on_death_avg": 209.2169
    }
  };

  // Helper – sign-prefixed number string
  function signed(n, dec = 1) {
    const v = parseFloat(n.toFixed(dec));
    return (v >= 0 ? '+' : '') + v;
  }

  function fmt(n, dec = 1) {
    return parseFloat(n.toFixed(dec)).toString();
  }

  // ── Populate header ──
  document.getElementById('player-name').textContent = data.name;
  document.getElementById('leetify-link').href =
    `https://leetify.com/app/profile/${data.steam64_id}`;

  // ── Stats mapping ──
  // AIM  → rating.aim  (show as score 0-100-ish, Leetify shows 35.6 in screenshot → probably a percentile)
  // The screenshot shows "35.6" for AIM, which corresponds to the aim percentile/rating.
  // Since data.rating.aim = 1.3903, this is clearly a different user; we use this CVS data as-is.

  // AIM rating percentile – Leetify encodes as a 0-100 percentile internally; we display what we have.
  const aimVal = data.rating.aim;
  const aimEl  = document.getElementById('stat-aim');
  aimEl.textContent = fmt(aimVal);
  // Colour: above ~50 positive, below negative
  aimEl.className = 'stat-value ' + (aimVal >= 50 ? 'positive' : aimVal < 20 ? 'negative' : 'neutral');

  // CLUTCH
  const clutchEl = document.getElementById('stat-clutch');
  clutchEl.textContent = signed(data.rating.clutch);
  clutchEl.className   = 'stat-value ' + (data.rating.clutch >= 0 ? 'positive' : 'negative');

  // RATING  (average of ct_leetify & t_leetify)
  const avgRating = (data.rating.ct_leetify + data.rating.t_leetify) / 2;
  const ratingEl  = document.getElementById('stat-rating');
  ratingEl.textContent = signed(avgRating);
  ratingEl.className   = 'stat-value ' + (avgRating >= 0 ? 'positive' : 'negative');

  // TIME TO DMG → reaction_time_ms
  document.getElementById('stat-time-to-dmg').textContent =
    Math.round(data.stats.reaction_time_ms) + 'ms';

  // WINRATE → winrate (CT side: ct_opening vs T side: t_opening)
  const ctWin  = Math.round(data.stats.ct_opening_duel_success_percentage);
  const tWin   = Math.round(data.stats.t_opening_duel_success_percentage);
  document.getElementById('stat-winrate').textContent = `${ctWin}% / ${tWin}%`;

  // UTILITY → rating.utility
  const utilEl = document.getElementById('stat-utility');
  utilEl.textContent = fmt(data.rating.utility);
  utilEl.className   = 'stat-value ' + (data.rating.utility >= 50 ? 'positive' : 'neutral');

  // OPENING → rating.opening
  const openEl = document.getElementById('stat-opening');
  openEl.textContent = signed(data.rating.opening);
  openEl.className   = 'stat-value ' + (data.rating.opening >= 0 ? 'positive' : 'negative');

  // PARTY → flashbang_hit_foe_per_flashbang (used as "party" proxy; displayed 2 dp)
  document.getElementById('stat-party').textContent =
    fmt(data.stats.flashbang_hit_foe_per_flashbang, 2);

  // AVG HE DMG → he_foes_damage_avg / he_friends_damage_avg
  const heFoe    = fmt(data.stats.he_foes_damage_avg, 1);
  const heFriend = fmt(data.stats.he_friends_damage_avg, 1);
  document.getElementById('stat-he-dmg').textContent = `${heFoe} / ${heFriend}`;

  // MATCHES → total_matches / bans%
  const bansPct = data.bans.length > 0
    ? ((data.bans.length / data.total_matches) * 100).toFixed(1)
    : '0.0';
  document.getElementById('stat-matches').innerHTML =
    `<span class="underline">${data.total_matches}</span> / ${bansPct}%`;

  // POSITION → rating.positioning
  const posEl = document.getElementById('stat-position');
  posEl.textContent = fmt(data.rating.positioning);
  posEl.className   = 'stat-value ' + (data.rating.positioning >= 50 ? 'positive' : 'neutral');

  // KD → traded_deaths_success_percentage / trade_kills_success_percentage (proxy; no direct kd field)
  const kdProxy = (data.stats.trade_kills_success_percentage / data.stats.traded_deaths_success_percentage);
  const kdEl    = document.getElementById('stat-kd');
  kdEl.textContent = fmt(kdProxy, 2);
  kdEl.className   = 'stat-value ' + (kdProxy >= 1 ? 'positive' : 'negative');

  // PREAIM → stats.preaim
  document.getElementById('stat-preaim').textContent = fmt(data.stats.preaim, 2) + '°';

  // PEAK RATING → ranks.leetify (we negate to show magnitude; use as elo proxy)
  // The screenshot shows a blue "13,288" which is a Premier rating. We show ranks.leetify value.
  const peakRating = Math.abs(data.ranks.leetify);
  document.getElementById('peak-number').textContent = peakRating.toLocaleString();

  // BANNED MATES
  const bannedPct = data.bans.length > 0
    ? ((data.bans.length / data.total_matches) * 100).toFixed(2)
    : '0.00';
  document.getElementById('stat-banned').textContent = bannedPct + '%';
</script>

</body>
</html>
